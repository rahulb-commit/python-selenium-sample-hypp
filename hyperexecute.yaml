version: 0.1
globalTimeout: 150
testSuiteTimeout: 150
testSuiteStep: 150

runson: linux

autosplit: true
concurrency: 1

retryOnFailure: true
maxRetries: 3

pre:
  - pip3 install --user -r requirements.txt

testRunnerCommand: python3 $test

post:
  - rm -f demo.txt

testDiscovery:
  type: raw
  mode: static
  command: echo lambdatest.py

jobLabel: ["selenium", "python", "hyperexecute-assignment"]